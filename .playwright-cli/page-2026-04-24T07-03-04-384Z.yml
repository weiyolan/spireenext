          - generic [ref=e149]: Elevate your performance, sustainably.
        - generic [ref=e151]:
          - generic [ref=e152]:
            - heading "Non Mulesing" [level=3] [ref=e154]
            - paragraph [ref=e155]: At Spiree, we care deeply about animal welfare, and that's why we make sure that no mulesing is practiced by our suppliers. Mulesing is a painful process that involves removing strips of skin from the sheep's rear end to prevent flystrike. This practice is cruel and unnecessary, and we refuse to support it. By choosing Spiree, you can trust that your sustainable and eco-friendly merino wool garments are not only good for the planet but also for the animals who provide us with this amazing material.
          - generic [ref=e156]:
            - heading "Planet" [level=3] [ref=e158]
            - paragraph [ref=e159]: Merino wool is a sustainable clothing choice with minimal ecological impact. Its production process uses less energy and water compared to synthetic fibers, and its natural antibacterial properties reduce the need for frequent washing, extending its lifespan. Additionally, merino wool is biodegradable and can be recycled, making it a responsible choice for those who want to reduce their environmental footprint. At Spiree, we take pride in using this eco-friendly fabric for our products, ensuring you stay warm and comfortable while reducing your impact on the planet.
          - generic [ref=e160]:
            - heading "Health" [level=3] [ref=e162]
            - paragraph [ref=e163]: Merino wool is not only a luxurious and eco-friendly material, but it's also recyclable and compostable! Unlike synthetic materials that pollute the environment, merino wool can be broken down naturally and reused in new products. By choosing merino wool, you're not only making a sustainable choice for yourself but also for the planet. Join us in our mission to create a circular fashion economy and reduce waste by choosing sustainable materials like merino wool.
      - generic [ref=e165]:
        - generic [ref=e166]:
          - heading "Care" [level=2] [ref=e167]
          - generic [ref=e168]: "Maximizing the Longevity of Your Merino Wool Base Layer: Washing Tips and Tricks"
        - paragraph [ref=e169]: Merino wool is an incredibly durable material that requires minimal washing due to its natural antibacterial properties. However, when it comes time to give your base layer a refresh, it's important to take proper care in washing to ensure its longevity. With the right techniques, your merino wool base layer can continue to provide you with warmth, comfort, and odor resistance for years to come.
        - generic [ref=e170]:
          - generic [ref=e171]:
            - heading "Washing" [level=3] [ref=e172]
            - list [ref=e173]:
              - listitem [ref=e174]: Machine wash on a gentle cycle with cold water and similar colors.
              - listitem [ref=e175]: Use a mild detergent specifically designed for wool and avoid enzyme washing powder.
              - listitem [ref=e176]: Avoid fabric softeners and bleach.
              - listitem [ref=e177]: Lay flat to dry, do not tumble dry or wring and twist.
              - listitem [ref=e178]: Do not dry clean.
              - listitem [ref=e179]: Store your merino wool base layer clean and dry, away from direct sunlight and heat sources.
          - generic [ref=e180]:
